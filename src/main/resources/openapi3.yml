          content: {}
        404:
          description: Not Found
          content: {}
  /v2/{representation},edge/{edgeTypes}:
    get:
      tags:
        - Edges
      summary: Edge details for given edge types
      description: Multiple edge types supported as comma-separated values. Response fields prefixed with `e` (edge), `sb` (start station) and `se` (end station).
      security:
