components:
  parameters:
    # V2 PARAMETERS -----------------------------------------------------------------------------
    representation:
      name: representation
      in: path
      description: |
        Output structure: `flat` (array) or `tree` (hierarchical).
        Same as `flat,node`, `tree,node`.
        See **Representation** in the introduction.
      required: true
      schema:
        type: string
        default: flat
    representationedge:
      name: representation
      in: path
      description: |
        Output structure including type: `flat,edge` or `tree,edge`.
        See **Representation** in the introduction.
      required: true
      schema:
        type: string
        default: flat,edge
    representationevent:
      name: representation
      in: path
      description: |
        Output structure including type: `flat,event` or `tree,event`.
        See **Representation** in the introduction.
      required: true
      schema:
        type: string
        default: flat,event
    stationTypes:
      name: stationTypes
      in: path
      description: Station types as comma-separated values. Use `*` for all.
      required: true
      schema:
        type: string
        default: "*"
    edgeTypes:
      name: edgeTypes
      in: path
      description: Edge types as comma-separated values. Use `*` for all.
      required: true
      schema:
        type: string
        default: "*"
    dataTypes:
      name: dataTypes
      in: path
      description: Data types as comma-separated values. Use `*` for all.
      required: true
      schema:
        type: string
        default: "*"
    eventorigins:
      name: eventorigins
      in: path
      description: Event origins (source names) as comma-separated values. Use `*` for all.
      required: true
      schema:
        type: string
        default: "*"
    timepoint:
      name: timepoint
      in: path
      description: "Point in time. Format: `yyyy-MM-dd[T[HH][:mm][:ss][.SSS]][Z]` (e.g. `2024-01-15T10:30:00+0200`)"
      required: true
      schema:
        type: string
    from:
      name: from
      in: path
      description: "Start of a half-open interval [from, to). Format: `yyyy-MM-dd[T[HH][:mm][:ss][.SSS]][Z]`"
      required: true
      schema:
        type: string
    to:
      name: to
      in: path
      description: "End of a half-open interval [from, to). Format: `yyyy-MM-dd[T[HH][:mm][:ss][.SSS]][Z]`"
      required: true
      schema:
        type: string
    where:
      name: where
      in: query
      description: |
        Filter results with one or more conditions in the form `field.operator.value`.
        Separate multiple conditions with commas — they are combined with AND.

        **`eq` examples**
        - `sactive.eq.true` only active stations
        - `scode.eq."200"` station with code "200" (quoted to force string match)
        - `sorigin.eq."Neogy"` stations from the Neogy data provider
        - `smetadata.city.eq."Bolzano"` drill into nested JSON metadata
        - `description.eq.null` field is not set

        **Operators**
         -   eq: Equal
         -   neq: Not Equal
         -   lt: Less Than
         -   gt: Greater Than
         -   lteq: Less Than Or Equal
         -   gteq: Greater Than Or Equal
         -   re: Regular Expression
         -   ire: Insensitive Regular Expression
         -   nre: Negated Regular Expression
         -   nire: Negated Insensitive Regular Expression
         -   bbi: Bounding box intersecting objects.  
             Syntax: left-x, left-y, right-x, right-y, SRID (optional, default 4326)  
             `coordinate.bbi.(11,46,12,47,4326)`  
         -   bbc: Bounding box containing objects. Same syntax as bbi.
         -   dlt: Within distance in meters from a point.  
             Syntax: distance, point-x, point-y, SRID (optional, default 4326)  
             e.g. `coordinate.dlt.(5000,11.2,46.7,4326)`
         -   in: Value found in list. Example: `name.in.(Peter,Patrick,Rudi)`
         -   nin: Value not found in list. Example: `name.nin.(Peter,Patrick,Rudi)`

        Numbers are auto-cast to numeric type.  
        `"` quote values to force string comparison.

        **Logical grouping**
        - `and(cond,cond,...)`
        - `or(cond,cond,...)`
        
        nestable, e.g. `or(scode.eq."A",scode.eq."B")`
      schema:
        type: string
    select:
      name: select
      in: query
      description: |
        Comma-separated list of fields to include in the response.
        Field names must match exactly as they appear in the output, including nested JSON paths.
        Example: `sname,scode,smetadata.city.cap`
      schema:
        type: string
    limit:
      name: limit
      in: query
      description: Max number of results. Set to -1 to disable.
      schema:
        type: integer
        format: int64
        default: 200
    offset:
      name: offset
      in: query
      description: Pagination offset, used together with `limit`.
      schema:
        type: integer
        format: int64
        default: 0
    distinct:
      name: distinct
      in: query
      description: Remove duplicate entries.
      schema:
        type: boolean
        default: true
    shownull:
      name: shownull
      in: query
      description: Include JSON keys with null values in the response.
      schema:
        type: boolean
        default: false
    timezone:
      name: timezone
      in: query
      description: Timezone for response timestamps (java.time.ZoneId format).
      schema:
        type: string
        default: UTC
    origin:
      name: origin
      in: query
      description: Identify your application to us. Don't confuse with `sorigin`
      schema:
        type: string
        default: ""

  schemas:
    measurement:
      description: |
        ```
        Prefix: m
        ```
        Measurements: Stations have sensors that measure a certain type of data. This is the outcome...
        <br /><br />
        *Important: Nested objects are not available when you use `flat` as representation, refer to them directly instead.*
      properties:
        mvalue:
          oneOf:
            - type: object
              description: free-form JSON object
            - type: number
            - type: string
        mvalidtime:
          type: string
          format: date-time
          description: When has this value been measured?
        mtransactiontime:
          type: string
          format: date-time
          description: When has this value been recorded on the database the first time?
        mperiod:
          type: integer
          description: Distance in seconds between two measurements
        mprovenance:
          $ref: "#/components/schemas/provenance"
    provenance:
      description: |
        ```
        Prefix: pr
        ```
        Provenance: Which data collector inserted or updated this information?
      properties:
        prname:
          format: text
          type: string
          description: Name of the data collector, elaboration tool, or manual data manipulation
        prversion:
          format: text
          type: string
          description: Version of the data collector, elaboration tool, or manual data manipulation
          example: 2299032843ef73db1811d615be8d8061e7d76322 (<-- a git sha)
          nullable: true
        prlineage:
          format: text
          type: string
    datatype:
      description: |
        ```
        Prefix: t
        ```
        Datatype: The data type of a measurement, for example temperature in °C.
        <br /><br />
        *Important: Nested objects are not available when you use `flat` as representation, refer to them directly instead.*
      properties:
        tname:
          type: string
        tunit:
          type: string
        ttype:
          type: string
        tdescription:
          type: string
          nullable: true
        tmeasurements:
          type: array
          items:
            $ref: "#/components/schemas/measurement"
    parent:
      description: |
        ```
        Prefix: p
        ```
        Parent: The parent station of a measurement station, for example the echarging station that contains echarging plugs
      properties:
        pname:
          type: string
          description: Name of the parent station
        ptype:
          type: string
          description: Type of the parent station
        pcode:
          type: string
          description: Unique ID of this parent station (inside this `ptype`)
        porigin:
          type: string
          description: Where did we get this station information from?
        pactive:
          type: boolean
          description: Is this station still used? Has it had updates recently?
        pavailable:
          type: boolean
          description: Should this station be visible to API consumers? (Do not use this, it will be removed. Only available stations are visible)
          deprecated: true
        pcoordinate:
          $ref: "#/components/schemas/coordinate"
        pmetadata:
          type: object
          description: free-form JSON object
    station:
      description: |
        ```
        Prefix: s
        ```
        Station: A measurement station.
        <br /><br />
        *Important: Nested objects are not available when you use `flat` as representation, refer to them directly instead.*
      properties:
        sname:
          type: string
          description: Name of the measurement station
        stype:
          type: string
          description: Type of the measurement station
        scode:
          type: string
          description: Unique ID of this measurement station (inside this `ptype`)
        sorigin:
          type: string
          description: Where did we get this station information from?
        sactive:
          type: boolean
          description: Is this station still used? Has it had updates recently?
        savailable:
          type: boolean
          description: Should this station be visible to API consumers? (Do not use this, it will be removed. Only available stations are visible)
          deprecated: true
        scoordinate:
          $ref: "#/components/schemas/coordinate"
        smetadata:
          type: object
          description: free-form JSON object
        sparent:
          $ref: "#/components/schemas/parent"
    stationbegin:
      description: |
        ```
        Prefix: sb
        ```
        Stationbegin: The starting station that is connected to another station with an edge
      properties:
        sbname:
          type: string
          description: Name of the starting measurement station
        sbtype:
          type: string
          description: Type of the starting measurement station
        sbcode:
          type: string
          description: Unique ID of this measurement station (inside this `ptype`)
        sborigin:
          type: string
          description: Where did we get this station information from?
        sbactive:
          type: boolean
          description: Is this station still used? Has it had updates recently?
        sbavailable:
          type: boolean
          description: Should this station be visible to API consumers? (Do not use this, it will be removed. Only available stations are visible)
          deprecated: true
        sbcoordinate:
          $ref: "#/components/schemas/coordinate"
    stationend:
      description: |
        ```
        Prefix: se
        ```
        Stationend: The ending station that is connected to another station with an edge
      properties:
        sename:
          type: string
          description: Name of the ending measurement station
        setype:
          type: string
          description: Type of the ending measurement station
        secode:
          type: string
          description: Unique ID of this measurement station (inside this `ptype`)
        seorigin:
          type: string
          description: Where did we get this station information from?
        seactive:
          type: boolean
          description: Is this station still used? Has it had updates recently?
        seavailable:
          type: boolean
          description: Should this station be visible to API consumers? (Do not use this, it will be removed. Only available stations are visible)
          deprecated: true
        secoordinate:
          $ref: "#/components/schemas/coordinate"
    edge:
      description: |
        ```
        Prefix: e
        ```
        Edge: The edge that connects two stations.
        <br /><br />
        *Important: Nested objects are not available when you use `flat` as representation, refer to them directly instead.*
      properties:
        ename:
          type: string
          description: Name of the edge
        etype:
          type: string
          description: Type of the edge
        ecode:
          type: string
          description: Unique ID of this edge (inside this `etype`)
        eorigin:
          type: string
          description: Where did we get this edge information from?
        eactive:
          type: boolean
          description: Is this edge still used? Has it had updates recently?
        eavailable:
          type: boolean
          description: Should this edge be visible to API consumers? (Do not use this, it will be removed. Only available edges are visible)
          deprecated: true
        edirected:
          type: boolean
        egeometry:
          type: object
        ebegin:
          $ref: "#/components/schemas/stationbegin"
        eend:
          $ref: "#/components/schemas/stationend"
    location:
      description: |
        ```
        Prefix: evl
        ```
        Location: The location of a traffic event
      properties:
        evldescription:
          type: string
        evlgeometry:
          type: object
    event:
      description: |
        ```
        Prefix: ev
        ```
        Event: A traffic event.
        <br /><br />
        *Important: Nested objects are not available when you use `flat` as representation, refer to them directly instead.*
      properties:
        evcategory:
          type: string
        evseriesuuid:
          type: string
        evtransactiontime:
          type: string
        evdescription:
          type: string
        evstart:
          type: string
        evend:
          type: string
        evorigin:
          type: string
        evuuid:
          type: string
        evname:
          type: string
        evmetadata:
          type: string
        evlocation:
          $ref: "#/components/schemas/location"
        evprovenance:
          $ref: "#/components/schemas/provenance"
    coordinate:
      description: |
        Coordinates: Latitude and longitude
        <br /><br />
        *Important: Coordinates cannot be accessed directly. For example, `coordinate.x` is not possible at the moment.*
      properties:
        x:
          type: number
        y:
          type: number
        srid:
          type: integer
          default: 4326
  securitySchemes:
    OAuth2:
      type: oauth2
      description: |-
        This API uses OAuth2 with either 'Authorization Code' (for frontends) or 'Client Credentials' (for machine-to-machine) flows.

        - Authorization Code: use `client_id = opendatahub-swagger`, leave client_secret empty
        - Client Credentials: use the client_id and client_secret provided by the Open Data Hub team

      flows:
        authorizationCode:
          authorizationUrl: __AUTH_SERVER_URL__/realms/noi/protocol/openid-connect/auth
          tokenUrl: __AUTH_SERVER_URL__/realms/noi/protocol/openid-connect/token
        clientCredentials:
          tokenUrl: __AUTH_SERVER_URL__/realms/noi/protocol/openid-connect/token
