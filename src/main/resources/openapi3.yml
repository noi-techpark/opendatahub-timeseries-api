openapi: 3.0.1
info:
  title: Open Data Hub Timeseries / Mobility API
  description: >
    ## About this API

    This API exposes both historical and up to date time series data in a common format.

    [Datasets available on the Open Data Hub](https://opendatahub.com/datasets/)

    ## Data model

    Time series data are a series of **measurements** of a common **type**, measured by a **station**

    ### Station

    A station represents a location or device where measurements are taken.
     - `stype`: e.g. `ParkingStation`, `MeteoStation`
     - `sactive`: whether the station is still being updated. Filter for `sactive.eq.false` if you want up to date information
     - `scode`: an identifier unique for this station type
     - `sname`: full text name of the station
     - `scoordinate`: where is this station located
     - `sorigin`: who provided this data
     - `smetadata`: A JSON object with additional information, depending on the provider

     ### Type

    Every measurement has a type, e.g. `temperature` or `free` to indicate the number of available parking spaces
     - `tname`: unique identifier of the type `temperature`
     - `t...`: additional information about the type

     ### Measurement
      - `mvalidtime`: timestamp of the measurement
      - `mvalue`: the measured value. Number, string or json object
      - `mperiod`: update frequency of this timeseries in seconds. Depending on the dataset this might be an approximation

    ### Others
     - `pr...` provenance: technical information about the data collection
     - `p...` parent: Some stations have a parent station

    ### Representation

    You choose whether you want the response flattened as an array (`flat`) or as a hierarchical structure (`tree`).
    The data is the same, just structured differently.

    ## Additional Documentation
     - [Mobility Datasets](https://docs.opendatahub.com/en/latest/datasets.html#datasets-in-the-mobility-domain)
     - [Getting Started](https://docs.opendatahub.com/en/latest/howto/mobility/getstarted.html)
     - [General Howtos](https://docs.opendatahub.com/en/latest/howto.html)
     - [Source Code](https://github.com/noi-techpark/opendatahub-timeseries-api)


  termsOfService: https://docs.opendatahub.com/en/latest/licenses.html#apis-terms-of-service
  contact:
    name: Open Data Hub
    url: https://opendatahub.com
    email: help@opendatahub.com
  license:
    name: API License
    url: https://docs.opendatahub.com/en/latest/licenses.html
  version: V2
servers:
  - url: __ODH_SERVER_URL__
tags:
  - name: General
    description: Entry points to discover data
  - name: Timeseries
    description: Time series measurements at stations
  - name: Edges
    description: Edge data connecting two stations
  - name: Events
    description: "**Deprecated** — Events are slated for removal"
paths:
  # V2 ----------------------------------------------------------------------------------------
  /v2/:
    get:
      tags:
        - General
      summary: List entry points to the Open Data Hub Timeseries
      security:
        - OAuth2: []
      parameters:
        - $ref: "#/components/parameters/origin"
      responses:
        200:
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        401:
          description: Unauthorized
          content: {}
        403:
          description: Forbidden
          content: {}
        404:
          description: Not Found
          content: {}
  /v2/{representation}:
    get:
      tags:
        - Timeseries
      summary: List all station types
      security:
        - OAuth2: []
      parameters:
        - $ref: "#/components/parameters/representation"
        - $ref: "#/components/parameters/origin"
      responses:
        200:
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        401:
          description: Unauthorized
          content: {}
        403:
          description: Forbidden
          content: {}
        404:
          description: Not Found
          content: {}
  /v2/{representation},edge:
    get:
      tags:
        - Edges
      summary: List all edge types
      security:
        - OAuth2: []
      parameters:
        - $ref: "#/components/parameters/representationedge"
        - $ref: "#/components/parameters/origin"
      responses:
        200:
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        401:
          description: Unauthorized
          content: {}
        403:
          description: Forbidden
          content: {}
        404:
          description: Not Found
          content: {}
  /v2/{representation},event:
    get:
      tags:
        - Events
      deprecated: true
      summary: List all event origins
      security:
        - OAuth2: []
      parameters:
        - $ref: "#/components/parameters/representationevent"
        - $ref: "#/components/parameters/origin"
      responses:
        200:
